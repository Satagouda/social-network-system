server:
  port: 8083

spring:
  application:
    name: FEED-SERVICE

  data:
    mongodb:
      uri: mongodb://localhost:27017/social_db

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: feed-group
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"

    listener:
      missing-topics-fatal: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}