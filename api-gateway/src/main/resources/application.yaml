server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  redis:
    host: localhost
    port: 6379

  cloud:
    gateway:
      routes:

        - id: USER-SERVICE
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**

        - id: POST-SERVICE
          uri: lb://POST-SERVICE
          predicates:
            - Path=/posts/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5     # tokens per second
                redis-rate-limiter.burstCapacity: 10    # max burst
                key-resolver: "#{@userKeyResolver}"

        - id: FEED-SERVICE
          uri: lb://FEED-SERVICE
          predicates:
            - Path=/feed/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}